<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Skill</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav>
        <a href="/#about">About Me</a>
        <a href="/#education">Education</a>
        <a href="/#projects">Projects</a>
        <a href="/#experience">Experience</a>
        <a href="/#skills">Skills</a>
    </nav>

    <div class="add-edu-page page-skills">
        <h2>Add Skill</h2>

        <form action="/skill/save" method="post">
            <div class="form-group">
                <label>Skill</label>
                <input type="text" name="skill" placeholder="e.g. Java" required />
            </div>
            <div class="form-group">
                <label>Level</label>
                <select name="level" required>
                    <option value="" disabled selected>Select level</option>
                    <option value="Novice">Novice</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                    <option value="Expert">Expert</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category" required>
                    <option value="" disabled selected>Select category</option>
                    <option value="Languages">Languages</option>
                    <option value="Tools">Tools</option>
                    <option value="Design">Design</option>
                    <option value="Databases">Databases</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="add-btn">Save Skill</button>
                <a href="/" class="add-btn" style="background-color: #aaa;">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
