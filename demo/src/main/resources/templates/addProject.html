<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Project</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav>
        <a href="/#about">About Me</a>
        <a href="/#education">Education</a>
        <a href="/#projects">Projects</a>
        <a href="/#experience">Experience</a>
        <a href="/#skills">Skills</a>
    </nav>

    <div class="add-edu-page" style="background-color: #fff6e9;">
        <h2 style="font-size: 28px; font-weight: normal; color: #222222; margin-bottom: 30px;">Add Project</h2>

        <form action="/project/save" method="post">
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" name="projectName" placeholder="e.g. Portfolio Website" required />
            </div>
            <div class="form-group">
                <label>Technologies</label>
                <input type="text" name="technologies" placeholder="e.g. Java, Spring Boot, MySQL" required />
            </div>
            <div class="form-group">
                <label>Start Date</label>
                <input type="text" name="startDate" placeholder="e.g. Jan 2024" required />
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="text" name="endDate" placeholder="e.g. Mar 2024" required />
            </div>

            <div class="form-group">
                <label>Description / Details</label>
                <div id="descriptions-container">
                    <textarea name="descriptions" placeholder="e.g. Built REST API with Spring Boot" rows="2" style="margin-bottom: 8px;"></textarea>
                </div>
                <button type="button" onclick="addDescriptionField()" class="add-btn" style="background-color: #aaa; margin-top: 4px;">+ Add Another</button>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 10px;">
                <button type="submit" class="add-btn">Save Project</button>
                <a href="/" class="add-btn" style="background-color: #aaa;">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        function addDescriptionField() {
            const container = document.getElementById('descriptions-container');
            const ta = document.createElement('textarea');
            ta.name = 'descriptions';
            ta.rows = 2;
            ta.placeholder = 'Add another detail...';
            ta.style.marginBottom = '8px';
            container.appendChild(ta);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
