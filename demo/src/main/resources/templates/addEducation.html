<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Education</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav>
        <a href="/#about">About Me</a>
        <a href="/#education">Education</a>
        <a href="/#projects">Projects</a>
        <a href="/#experience">Experience</a>
        <a href="/#skills">Skills</a>
    </nav>

    <div class="add-edu-page">
        <h2>Add Education</h2>

        <form action="/education/save" method="post">
            <div class="form-group">
                <label>School Name</label>
                <input type="text" name="schoolName" placeholder="e.g. De La Salle University" required />
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="e.g. Manila" required />
            </div>
            <div class="form-group">
                <label>Degree</label>
                <input type="text" name="degree" placeholder="e.g. Bachelor of Science" required />
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" name="course" placeholder="e.g. Computer Science" required />
            </div>
            <div class="form-group">
                <label>Years</label>
                <input type="text" name="years" placeholder="e.g. 2021 - 2025" required />
            </div>
            <div class="form-group">
                <label>Coursework / Details</label>
                <div id="coursework-container">
                    <textarea name="coursework" placeholder="e.g. Data Structures, Algorithms" rows="2"></textarea>
                </div>
                <button type="button" onclick="addCourseworkField()" class="add-btn" style="background-color: #aaa; margin-top: 4px;">+</button>
            </div>

            <div class="form-actions">
                <button type="submit" class="add-btn">Save Education</button>
                <a href="/" class="add-btn" style="background-color: #aaa;">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        function addCourseworkField() {
            const container = document.getElementById('coursework-container');
            const ta = document.createElement('textarea');
            ta.name = 'coursework';
            ta.rows = 2;
            ta.placeholder = 'Add another coursework...';
            ta.className = 'detail-input';
            container.appendChild(ta);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
