<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Experience</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav>
        <a href="/#about">About Me</a>
        <a href="/#education">Education</a>
        <a href="/#projects">Projects</a>
        <a href="/#experience">Experience</a>
        <a href="/#skills">Skills</a>
    </nav>

    <div class="add-edu-page" style="background-color: #ffeffe;">
        <h2 style="font-size: 28px; font-weight: normal; color: #222222; margin-bottom: 30px;">Add Experience</h2>

        <form action="/experience/save" method="post">
            <div class="form-group">
                <label>Organization</label>
                <input type="text" name="organization" placeholder="e.g. Acme Corp" required />
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" placeholder="e.g. Metro Manila" required />
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" name="role" placeholder="e.g. Software Engineer Intern" required />
            </div>
            <div class="form-group">
                <label>Years</label>
                <input type="text" name="years" placeholder="e.g. Jun 2023 - Aug 2023" required />
            </div>

            <div class="form-group">
                <label>Description / Details</label>
                <div id="descriptions-container">
                    <textarea name="descriptions" placeholder="e.g. Implemented feature X, improved performance" rows="2" style="margin-bottom: 8px;"></textarea>
                </div>
                <button type="button" onclick="addDescriptionField()" class="add-btn" style="background-color: #aaa; margin-top: 4px;">+ Add Another</button>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 10px;">
                <button type="submit" class="add-btn">Save Experience</button>
                <a href="/" class="add-btn" style="background-color: #aaa;">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addDescriptionField() {
            const container = document.getElementById('descriptions-container');
            const ta = document.createElement('textarea');
            ta.name = 'descriptions';
            ta.rows = 2;
            ta.placeholder = 'Add another detail...';
            ta.style.marginBottom = '8px';
            container.appendChild(ta);
        }
    </script>
</body>
</html>
